app:
  title: "SpeakType"
  idle_icon: "🎙️"
  recording_icon: "⏺️"
  processing_icon: "⏳"
  menu: ["Start Recording", "Stop Recording", "Copy Last"]

whisper:
  model: base
  language: en
  device: cpu

ollama:
  host: "http://localhost:11434"
  model: "llama3.2:latest"
  prompt_template: |
    Please improve this transcribed text by:
    - Fixing any spelling or grammar errors
    - Adding proper punctuation
    - Making it more readable while preserving the meaning
    - Print only improved text no explaination

    Original text: {text}

    Improved text:

audio:
  sample_rate: 16000
  channels: 1
  silence_threshold: 0.01
  silence_duration: 2.0
  chunk_size: 1024
  language: "english"

clipboard:
  show_notifications: true
  notification_title: "SpeakType"
